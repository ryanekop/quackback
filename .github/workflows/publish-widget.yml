name: Publish @quackback/widget
on:
  push:
    tags: ['widget-v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run --filter @quackback/widget test
      - run: bun run --filter @quackback/widget typecheck
      - run: bun run --filter @quackback/widget build
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing requires npm >= 11.5.1; Node 22 ships with npm 10.x
      - run: npm install -g npm@latest
      # No NODE_AUTH_TOKEN — OIDC replaces the token; npmjs.com must have a
      # trusted publisher configured for this repo + workflow.
      - run: cd packages/widget && npm publish --provenance --access public
